<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Joy ❤️</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(135deg,#ff9a9e,#fad0c4);
    text-align:center;
    overflow-x:hidden;
}

/* PASSWORD SCREEN */
#lockScreen{
    position:fixed;
    width:100%;
    height:100%;
    background:black;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    z-index:9999;
}

input{
    padding:12px;
    border-radius:10px;
    border:none;
    text-align:center;
    font-size:16px;
}

/* MAIN */
#main{
    display:none;
    padding:20px;
}

button{
    padding:12px 18px;
    border:none;
    border-radius:20px;
    font-weight:bold;
    margin-top:10px;
    cursor:pointer;
}

/* HEARTS */
.heart{
    position:absolute;
    color:red;
    animation:float 6s linear infinite;
    z-index:1;
}

@keyframes float{
    0%{transform:translateY(100vh); opacity:1;}
    100%{transform:translateY(-10vh); opacity:0;}
}
</style>
</head>

<body>

<!-- PASSWORD -->
<div id="lockScreen">
    <h2>🔐 Enter Password</h2>
    <p>Hint: her name ❤️</p>
    <input type="password" id="pass">
    <button onclick="checkPass()">Unlock</button>
</div>

<!-- MAIN -->
<div id="main">

    <h1>🎉 Happy Birthday Joy Nayame Tembo 🎉</h1>
    <p>From: Jerome Tembo ❤️</p>

    <div id="countdown"></div>

    <button onclick="openMessage()">🎁 Open Your Surprise</button>

    <div id="message" style="display:none;margin-top:20px;">
        <h2>💌 Message for you</h2>
        <p id="text"></p>
    </div>

</div>

<script>

// PASSWORD (RESTORED WORKING)
function checkPass(){
    let p=document.getElementById("pass").value;

    if(p.toLowerCase()==="joy"){
        document.getElementById("lockScreen").style.display="none";
        document.getElementById("main").style.display="block";
        startHearts();
        startCountdown();
    } else {
        alert("Wrong password 😅 Hint: Joy");
    }
}

// COUNTDOWN
let target=new Date();
target.setDate(target.getDate()+1);
target.setHours(0,0,0,0);

function startCountdown(){
    setInterval(()=>{
        let now=new Date().getTime();
        let d=target-now;

        if(d<=0){
            document.getElementById("message").style.display="block";
            typeText();
        }

        let h=Math.floor(d%(1000*60*60*24)/(1000*60*60));
        let m=Math.floor(d%(1000*60*60)/(1000*60));
        let s=Math.floor(d%(1000*60)/1000);

        document.getElementById("countdown").innerHTML=
        "⏳ Time: "+h+"h "+m+"m "+s+"s";

    },1000);
}

// OPEN BUTTON
function openMessage(){
    document.getElementById("message").style.display="block";
    typeText();
}

// TYPE MESSAGE
let msg=`My love Joy ❤️

Today I just want you to smile and feel loved. You are special to me in ways words can’t fully explain.

Happy Birthday ❤️`;

let i=0;
function typeText(){
    if(i<msg.length){
        document.getElementById("text").innerHTML+=msg.charAt(i);
        i++;
        setTimeout(typeText,30);
    }
}

// HEARTS
function startHearts(){
    setInterval(()=>{
        let h=document.createElement("div");
        h.className="heart";
        h.innerHTML="❤️";
        h.style.left=Math.random()*100+"vw";
        document.body.appendChild(h);
        setTimeout(()=>h.remove(),6000);
    },300);
}

</script>

</body>
</html>
